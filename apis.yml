aid: graphic-packaging
name: Graphic Packaging
description: >-
  Graphic Packaging International is a Fortune 500 global manufacturer of
  sustainable, paperboard-based consumer packaging. Products include folding
  cartons, multipack cartons, foodservice packaging (cups, lids, to-go
  containers), microwave and ovenable packaging, paperboard canisters, and
  packaging machinery. Markets served include food, beverage, foodservice,
  household, personal care, healthcare, pharmaceuticals, pet care, beauty, and
  e-commerce. No public developer APIs are documented at this time.
